---
x-airflow-common:
  &airflow-common
  image: ${AIRFLOW_IMAGE_NAME:-apache/airflow:3.1.8}
  env_file:
    - .env
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor 
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false' # Turned off to keep your UI clean
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__WEBSERVER__BASE_URL: https://${CODESPACE_NAME}-8080.${GITHUB_CODESPACES_PORT_FORWARDING_DOMAIN}
    AIRFLOW__API__AUTH_TRUSTED_PROXIES: "0.0.0.0/0"
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-webserver:8080/execution/
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW__API_AUTH__JWT_SECRET:-airflow_jwt_secret}
    AIRFLOW__API_AUTH__JWT_ISSUER: ${AIRFLOW__API_AUTH__JWT_ISSUER:-airflow}
    # GCP Credentials - These point to the internal container paths
    GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/google/credentials/gcp-creds.json
    AIRFLOW_VAR_GCP_PROJECT_ID: ${GCP_PROJECT_ID}
    AIRFLOW_VAR_GCS_BUCKET: ${GCP_GCS_BUCKET}
    AIRFLOW_VAR_GCP_REGION: ${GCP_REGION}
    AIRFLOW_VAR_BRONZE_DATASET_NAME: ${BRONZE_DATASET_NAME}
    AIRFLOW_VAR_SILVER_DATASET_NAME: ${SILVER_DATASET_NAME}
    AIRFLOW_VAR_GOLD_DATASET_NAME: ${GOLD_DATASET_NAME}
    AIRFLOW_CONN_GOOGLE_CLOUD_DEFAULT: "google-cloud-platform://?key_path=%2fopt%2fairflow%2fgoogle%2fcredentials%2fgcp-creds.json&project_id=${GCP_PROJECT_ID}"
    # Python libraries for Airflow tasks
    _PIP_ADDITIONAL_REQUIREMENTS: "google-cloud-storage requests google-cloud-bigquery  dbt-bigquery astronomer-cosmos"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ../gcp-creds.json:/opt/airflow/google/credentials/gcp-creds.json
    - ../dbt/medicare:/opt/airflow/dbt/medicare 
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
    restart: always

  airflow-webserver:
    <<: *airflow-common
    command: api-server
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/version"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    restart: always

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        # Just initialize the DB, no chown or user creation needed here
        airflow db migrate
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      # These two lines handle user creation automatically in Airflow 3
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}

volumes:
  postgres-db-volume: